name: Pomni

on:
  schedule:
    - cron: "0 12 * * *"
      timezone: Europe/London

  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: canidae-solutions/lix-quick-install-action@v4

      - uses: cachix/cachix-action@v17
        with:
          name: drakon64
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - run: nix-shell -A pomni --run "exit"
        
      - run: |
          echo "OLD_HASH=$(nix eval --expr 'import ./default.nix { }' --raw --impure)" >> $GITHUB_ENV
          echo "OLD_SHELL_HASH=$(nix eval --expr 'import ./shell.nix { }' --raw --impure)" >> $GITHUB_ENV

      - run: nix-shell -A pomni --run "pomni update"

      - run: |
          echo "NEW_HASH=$(nix-build)" >> $GITHUB_ENV
          echo "NEW_SHELL_HASH=$(nix eval --expr 'import ./shell.nix { }' --raw --impure)" >> $GITHUB_ENV

      - run: git checkout pomni/pomni.lock.json
        if: ${{ env.NEW_HASH != env.OLD_HASH || env.NEW_SHELL_HASH != env.OLD_SHELL_HASH }}

      - run: nix-shell -A pomni --run "pomni bot github"
        env:
          BEARER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ env.NEW_HASH != env.OLD_HASH || env.NEW_SHELL_HASH != env.OLD_SHELL_HASH }}
